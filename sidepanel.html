<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World GPT - Command Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

        :root {
            --google-blue: #2563eb;
            --google-bg: #FFFFFF;
            --google-surface: #F8F9FA;
            --google-border: rgba(0, 0, 0, 0.06);
            --google-text: #18181b;
            --google-text-secondary: #71717a;
            --google-radius: 24px;
            --google-spring: cubic-bezier(0.2, 0, 0, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --google-bg: #000000;
                --google-surface: #0a0a0a;
                --google-border: rgba(255, 255, 255, 0.08);
                --google-text: #ffffff;
                --google-text-secondary: #a1a1aa;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--google-bg);
            color: var(--google-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px 24px;
            gap: 48px;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .logo-wrapper {
            width: 56px;
            height: 56px;
            background: var(--google-surface);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--google-border);
            margin-bottom: -12px;
        }

        .logo-wrapper img {
            width: 36px;
            height: 36px;
        }

        .welcome-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .welcome-text h1 {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: -0.02em;
            color: var(--google-text);
        }

        .welcome-text p {
            font-size: 16px;
            color: var(--google-text-secondary);
        }

        .input-bar-mock {
            width: 100%;
            max-width: 500px;
            background: var(--google-surface);
            border: 1px solid var(--google-border);
            border-radius: 32px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: text;
            transition: all 0.2s;
        }

        .input-bar-mock:hover {
            border-color: rgba(37, 99, 235, 0.4);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .mock-input-text {
            flex: 1;
            text-align: left;
            padding-left: 12px;
            color: var(--google-text-secondary);
            font-size: 16px;
        }

        .mock-actions {
            display: flex;
            gap: 8px;
        }

        .mock-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            color: var(--google-text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mock-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            color: var(--google-blue);
        }

        .mock-btn.primary {
            background: var(--google-blue);
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 500px;
        }

        .stat-card {
            background: var(--google-surface);
            border: 1px solid var(--google-border);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--google-text-secondary);
        }

        .stat-value {
            font-size: 24px;
            font-weight: 500;
            color: var(--google-text);
        }

        .footer {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            width: 100%;
        }

        .btn-studio {
            width: 100%;
            max-width: 500px;
            height: 48px;
            border-radius: 24px;
            background: var(--google-blue);
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-studio:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
        }

        .powered-by {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--google-text-secondary);
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="app-container">
        <div class="logo-wrapper">
            <img src="icons/Hello Icon.png" alt="Logo">
        </div>

        <div class="welcome-text">
            <h1>What's on your mind today?</h1>
            <p>Enhance your prompts with neural intelligence.</p>
        </div>

        <div class="input-bar-mock" id="input-trigger">
            <div class="mock-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
                </svg>
            </div>
            <div class="mock-input-text">Ask anything...</div>
            <div class="mock-actions">
                <div class="mock-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                </div>
                <div class="mock-btn primary">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m5 12 14-7-7 14-2-7-7-2Z" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Prompts Perfected</span>
                <span class="stat-value" id="stat-optimized">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Daily Streak</span>
                <span class="stat-value" id="stat-streak">1 🔥</span>
            </div>
        </div>

        <!-- Viral Growth Layer -->
        <div class="stat-card" style="width: 100%; max-width: 500px; background: linear-gradient(135deg, #2563eb10, #2563eb05); border-color: #2563eb20;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <span class="stat-label" style="color: var(--google-blue);">Level Up Goal</span>
                <span id="goal-progress" style="font-size: 11px; font-weight: 700; background: var(--google-blue); color: white; padding: 2px 8px; border-radius: 12px;">3/10</span>
            </div>
            <div style="width: 100%; height: 6px; background: rgba(0,0,0,0.05); border-radius: 3px; overflow: hidden; margin-bottom: 16px;">
                <div id="goal-bar" style="width: 30%; height: 100%; background: var(--google-blue); border-radius: 3px; transition: width 0.5s ease;"></div>
            </div>
            <p id="goal-text" style="font-size: 13px; color: var(--google-text-secondary); text-align: left; margin-bottom: 16px;">
                Perfect 7 more prompts to unlock **Pro Intelligence** and a 5-star badge!
            </p>
            <button id="share-btn" class="btn-studio" style="height: 40px; font-size: 13px; background: rgba(0,0,0,0.05); color: var(--google-text); box-shadow: none; border: 1px solid var(--google-border);">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                Share My Neural Progress
            </button>
        </div>

        <div class="footer">
            <a href="https://helloworldgpt.com" target="_blank" class="btn-studio">
                Open Full Studio
            </a>
            <div class="powered-by">Hello World GPT v5.1.5</div>
        </div>
    </div>

    <script src="sidepanel.js"></script>
</body>

</html>
