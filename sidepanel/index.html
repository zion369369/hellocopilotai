<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Copilot — Browser Layer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=12.0.0">
    <link rel="icon" href="../icons/icon16.png" type="image/png">
</head>
<body>
    <div class="sidebar-container">
        <!-- Native-Style Header -->
        <header class="sidebar-header">
            <div class="header-main">
                <img src="https://scontent.fdac20-1.fna.fbcdn.net/v/t39.30808-1/657582724_26564440456515340_6728634986172869669_n.jpg?stp=dst-jpg_s200x200_tt6&_nc_cat=111&ccb=1-7&_nc_sid=2d3e12&_nc_ohc=1sM8UOnxV8kQ7kNvwHRxpuy&_nc_oc=AdpWS43K4xg5uM79m-F924BEF9pi0exwImDUe16J3sgd9TLVzaO80Qm22xaJ5fXQAL0&_nc_zt=24&_nc_ht=scontent.fdac20-1.fna&_nc_gid=Gr3rQnifcxCw8OfNiZ1TnQ&_nc_ss=7a32e&oh=00_AfxptpNKduBKyAntGMXmkPoF3oILeEaaOw1c0zxmTghE4A&oe=69C9C7B7" alt="Hello Copilot" class="header-logo" loading="lazy" decoding="async">
                <div class="header-title-container">
                    <span class="header-title">Hello Copilot</span>
                    <select id="mode-selector" class="mode-selector">
                        <option value="chat" selected>Chat Mode</option>
                        <option value="search">Search Mode</option>
                    </select>
                </div>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chat-area">
            <div class="welcome-view" id="welcome-view">
                <div class="welcome-orb"></div>
                <h2>Reading with you! 👋</h2>
                <div class="context-pill">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    <span id="current-page">Injecting into DOM...</span>
                </div>
                
                <!-- Decision Engine Section -->
                <div class="decision-engine" id="decision-engine">
                    <div class="suggestion-header">
                        <div class="site-info">
                            <img id="site-favicon" src="icons/icon16.png" alt="" class="site-icon">
                            <span id="site-name">Current Page</span>
                            <span id="tab-count" class="tab-count"></span>
                        </div>
                        <svg class="chevron-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
                    </div>
                    <div class="quick-actions">
                        <button class="action-chip hero" id="gist-btn">
                            How is my LinkedIn post performing in terms of engagement?
                        </button>
                        <button class="action-chip" id="catch-btn">
                            Create a summary of this page
                        </button>
                        <button class="action-chip" id="history-btn">
                            Summarize my browsing history on LinkedIn
                        </button>
                    </div>
                </div>
            </div>
            <div class="messages-container" id="messages"></div>
            
            <div class="messages-container" id="messages"></div>
        </main>

        <footer class="sidebar-footer">
            <div class="input-bar">
                <div class="input-actions-row">
                    <button class="icon-btn-pill" id="image-upload-btn" title="Image Search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                    </button>
                    <button class="icon-btn-pill" id="search-grounding-btn" title="Grounded Search">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    </button>
                </div>
                <div class="input-main">
                    <textarea id="user-input" placeholder="Ask anything about this page..." rows="1"></textarea>
                    <button class="send-btn-pill" id="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m5 12 14-7-7 14-2-7-7-2Z"/></svg>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="app.js" type="module"></script>
</body>
</html>
